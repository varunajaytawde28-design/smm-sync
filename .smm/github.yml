# .smm/github.yml
# GitHub capture configuration for CaaS
# Commit this file — it contains no secrets.

repos:
  - owner: varunajaytawde28-design
    name: smm-sync
    project: smm-sync
    capture:
      pull_requests: true
      commits: true
      issues: true
      releases: true

  - owner: varunajaytawde28-design
    name: axiom-hub
    project: axiom-hub
    capture:
      pull_requests: true
      commits: true
      issues: false
      releases: true

settings:
  poll_interval_minutes: 30
  lookback_days: 30
  min_content_length: 50
  decision_keywords:
    - "decided"
    - "chose"
    - "rejected"
    - "because"
    - "instead of"
    - "rationale"
    - "trade-off"
    - "constraint"
    - "we will"
    - "we won't"
